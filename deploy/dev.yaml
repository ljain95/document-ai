# Local dev stack: Postgres 17 (parity with Supabase) + Flyway applying
# the SQL files in ../migrations.
#
# Run from the project root:
#   docker compose -f deploy/dev.yaml up flyway
#
# That brings up Postgres, waits for it to be healthy, then runs every
# V<NNN>__*.sql in migrations/ exactly once. Re-running is idempotent —
# Flyway tracks applied versions in the `flyway_schema_history` table.
#
# To point the app at this DB, set in .env.local:
#   DATABASE_URL=postgres://postgres:postgres@localhost:5432/reader

services:
  postgres:
    image: postgres:17-alpine
    container_name: reader_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reader"]
      interval: 3s
      timeout: 3s
      retries: 10

  flyway:
    image: flyway/flyway:11-alpine
    container_name: reader_flyway
    command: -connectRetries=10 migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/reader
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_DEFAULT_SCHEMA: public
      # Match our naming: V001__name.sql (Flyway defaults already do this,
      # but pin it so a future override doesn't quietly change behaviour).
      FLYWAY_SQL_MIGRATION_PREFIX: V
      FLYWAY_SQL_MIGRATION_SEPARATOR: __
      FLYWAY_SQL_MIGRATION_SUFFIXES: .sql
    volumes:
      - ../migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
